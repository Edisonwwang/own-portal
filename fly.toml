app = "personal-portal"
primary_region = "sin"

[build]
  dockerfile = "Dockerfile"

[env]
  DB_PATH = "/data/portal.db"
  PORT = "3000"

[mounts]
  source = "portal_data"
  destination = "/data"

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

[[vm]]
  memory = "1gb"
  cpu_kind = "shared"
  cpus = 1
